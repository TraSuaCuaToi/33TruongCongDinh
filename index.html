<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <title>Menu Trà Sữa</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: white;
      padding:0;
      margin:0;
      position: relative;
      min-height: 100vh;
      display: flex;
    }

    /* Sidebar */
    .sidebar {
      position: fixed;
      left: 0;
      top: 0;
      bottom: 0;
      width: 200px;
      background: #f8f8f8;
      padding: 20px;
      box-shadow: 2px 0 6px rgba(0,0,0,0.1);
      overflow-y: auto;
    }
    .sidebar h3 {
      margin-top: 0;
      font-size: 1.2rem;
      color: #e63946;
    }
    .sidebar button {
      display: block;
      width: 100%;
      padding: 10px;
      margin: 6px 0;
      border: none;
      background: #ffe4e9;
      border-radius: 6px;
      cursor: pointer;
      font-size: 1rem;
    }
    .sidebar button:hover {
      background: #e63946;
      color: white;
    }

    .main {
      margin-left: 220px; /* chừa chỗ cho sidebar */
      padding: 20px;
      width: 100%;
    }

    .grid {
      display:grid;
      grid-template-columns:repeat(auto-fill, minmax(220px,1fr));
      gap:18px;
      background-color: #ffe4e9; /* Nền màu hồng nhạt */
      padding: 20px;
      border-radius: 12px;
    }
    .card {
      background:#fff;
      border:1px solid #ddd;
      border-radius:8px;
      overflow:hidden;
      box-shadow:0 2px 6px rgba(0,0,0,.1);
      display:flex;
      flex-direction:column;
      position: relative;
    }
    .card img {
      width:100%;
      height:160px;
      object-fit:cover;
      display:block;
    }
    .info {
      padding:12px;
      display:flex;
      flex-direction:column;
      gap:6px;
    }
    .name {
      font-weight:bold;
      font-size:16px;
    }
    .meta {
      font-size:14px;
      color:#555;
    }
    .price {
      font-weight:bold;
      color:#e63946;
    }
    .desc {
      font-size:14px;
      color:#444;
      line-height:1.4;
      white-space:pre-line;
      margin-top:6px;
    }
    .add-to-cart-button {
      background-color: #e63946;
      color: white;
      border: none;
      padding: 8px;
      text-align: center;
      text-decoration: none;
      display: block;
      font-size: 1rem;
      cursor: pointer;
      border-radius: 0 0 8px 8px;
      width: 100%;
    }
    .add-to-cart-button:hover {
      background-color: #d42c38;
    }

    .store-info {
      text-align: center;
      margin-bottom: 30px;
      color: #e63949;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
    }
    .store-name {
      font-family: 'Dancing Script', cursive;
      font-size: 5rem;
      color: #8e44ad;
      margin: 0;
      line-height: 1.2;
    }
    .store-address {
      font-size: 1.2rem;
      margin-top: 5px;
      color: #555;
    }

    h2 {
      text-align: center;
      color: #e63946;
      margin: 20px 0;
      font-size: 2.5rem;
      font-family: 'Dancing Script', cursive;
      text-transform: uppercase;
      letter-spacing: 2px;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
    }

    /* Hiệu ứng hoa rơi */
    @keyframes fall {
      0% { transform: translateY(-10vh) rotate(0deg); opacity: 0; }
      10% { opacity: 1; }
      100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
    }
    .falling-element {
      position: fixed;
      top: 0;
      left: 0;
      font-size: 2rem;
      pointer-events: none;
      z-index: 100;
      animation: fall linear infinite;
    }

    /* CSS cho phần đăng nhập và giỏ hàng */
    .top-right-controls {
      position: absolute;
      top: 20px;
      right: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: flex-end;
    }
    .auth-form {
      display: flex;
      flex-direction: column;
      gap: 10px;
      background: #f0f0f0;
      padding: 15px;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    .auth-form input {
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    .auth-form button {
      padding: 10px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      background: #e63946;
      color: white;
    }
    .auth-form button:hover {
      background: #d42c38;
    }

    .cart-button {
      padding: 10px 15px;
      background-color: #5cb85c;
      color: white;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      font-size: 1rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .cart-button:hover {
      background-color: #4cae4c;
    }
    .cart-count {
      background-color: white;
      color: #5cb85c;
      border-radius: 50%;
      padding: 4px 8px;
      font-weight: bold;
    }

    #auth-status {
      font-size: 0.9rem;
      color: #333;
    }

    /* CSS cho popup */
    .modal {
      display: none;
      position: fixed;
      z-index: 1;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      overflow: auto;
      background-color: rgb(0,0,0);
      background-color: rgba(0,0,0,0.4);
      padding-top: 60px;
    }
    .modal-content {
      background-color: #fefefe;
      margin: 5% auto;
      padding: 20px;
      border: 1px solid #888;
      width: 80%;
      max-width: 500px;
      border-radius: 8px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    }
    .modal-content h3 {
      text-align: center;
      margin-top: 0;
      color: #e63946;
    }
    .modal-item {
      border-bottom: 1px solid #ddd;
      padding: 10px 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .modal-item:last-child {
      border-bottom: none;
    }
    .item-info {
      flex-grow: 1;
    }
    .item-info h4 {
      margin: 0;
      color: #e63946;
    }
    .item-controls {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .item-controls input, .item-controls select {
      width: 60px;
    }
    .item-controls .remove-btn {
      background-color: #f44336;
      color: white;
      border: none;
      padding: 5px 10px;
      border-radius: 4px;
      cursor: pointer;
    }
    .modal-content input, .modal-content textarea, .modal-content select {
      padding: 8px;
      margin: 8px 0;
      display: inline-block;
      border: 1px solid #ccc;
      box-sizing: border-box;
      border-radius: 4px;
      width: 100%;
    }
    .modal-content button {
      background-color: #e63946;
      color: white;
      padding: 12px 20px;
      margin: 8px 0;
      border: none;
      cursor: pointer;
      border-radius: 4px;
      width: 100%;
    }
    .modal-content button:hover {
      background-color: #d42c38;
    }
    .modal-footer {
      text-align: right;
      font-weight: bold;
      font-size: 1.2rem;
      margin-top: 10px;
      color: #e63946;
    }
    .close {
      color: #aaa;
      float: right;
      font-size: 28px;
      font-weight: bold;
    }
    .close:hover,
    .close:focus {
      color: black;
      text-decoration: none;
      cursor: pointer;
    }

    /* CSS cho danh sách đơn hàng */
    #order-list-container {
      display: none; /* Mặc định ẩn, chỉ hiện khi user đăng nhập */
      margin-top: 40px;
      background-color: #f8f8f8;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .order-card {
      background:#fff;
      border:1px solid #ddd;
      border-radius:8px;
      padding:15px;
      margin-bottom:15px;
      box-shadow:0 1px 3px rgba(0,0,0,.1);
      position: relative;
    }
    .order-card.completed {
      text-decoration: line-through;
      color: #999;
      background-color: #f0f0f0;
    }
    .order-card h4 {
      margin-top: 0;
      color: #e63946;
    }
    .order-item-detail {
      font-size: 0.9rem;
      margin-bottom: 5px;
    }
    .order-meta {
      font-size: 0.8rem;
      color: #888;
      margin-top: 10px;
      border-top: 1px dashed #ccc;
      padding-top: 10px;
    }
    .complete-btn {
      background-color: #4CAF50;
      color: white;
      border: none;
      padding: 8px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.9rem;
      margin-top: 10px;
    }
    .complete-btn:hover {
      background-color: #45a049;
    }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="sidebar">
    <h3>Nhóm món</h3>
    <div id="group-list"></div>
    <div id="auth-controls" style="margin-top: 20px;">
      <button id="logout-btn" style="display: none;">Đăng xuất</button>
      <button id="change-password-btn" style="display: none;">Đổi mật khẩu</button>
      <button id="create-user-btn" style="display: none;">Tạo tài khoản mới</button>
    </div>
  </div>

  <div class="main">
    <div id="falling-container"></div>
    <div class="store-info">
      <h1 class="store-name">Trà Sữa Của Tôi</h1>
      <p class="store-address">33 Tôn Đức Thắng, Đà Nẵng</p>
    </div>

    <div class="top-right-controls">
      <div id="auth-status">Bạn chưa đăng nhập.</div>
      <form id="login-form" class="auth-form">
        <h3>Đăng nhập</h3>
        <input type="email" id="login-email" placeholder="Email" required>
        <input type="password" id="login-password" placeholder="Mật khẩu" required>
        <button type="submit">Đăng nhập</button>
      </form>
      <button id="cart-button" class="cart-button">
        Giỏ Hàng (<span id="cart-count">0</span>)
      </button>
    </div>

    <h2>Menu Trà Sữa</h2>
    <div id="menu" class="grid"></div>

    <!-- Container danh sách đơn hàng -->
    <div id="order-list-container">
      <h2>Danh Sách Đơn Hàng</h2>
      <div id="order-list">Không có đơn hàng nào.</div>
    </div>
  </div>

  <!-- Modal đổi mật khẩu -->
  <div id="changePasswordModal" class="modal">
    <div class="modal-content">
      <span class="close" data-modal="changePasswordModal">&times;</span>
      <h3>Đổi Mật Khẩu</h3>
      <input type="password" id="old-password" placeholder="Mật khẩu cũ" required>
      <input type="password" id="new-password" placeholder="Mật khẩu mới (ít nhất 6 ký tự)" required>
      <input type="password" id="confirm-new-password" placeholder="Nhập lại mật khẩu mới" required>
      <button id="submit-change-password">Xác nhận Đổi Mật Khẩu</button>
    </div>
  </div>

  <!-- Modal tạo tài khoản mới -->
  <div id="createUserModal" class="modal">
    <div class="modal-content">
      <span class="close" data-modal="createUserModal">&times;</span>
      <h3>Tạo tài khoản mới</h3>
      <input type="email" id="new-user-email" placeholder="Email người dùng mới" required>
      <input type="password" id="new-user-password" placeholder="Mật khẩu (ít nhất 6 ký tự)" required>
      <button id="submit-create-user">Tạo tài khoản</button>
    </div>
  </div>

  <!-- Modal giỏ hàng và đặt hàng -->
  <div id="cartModal" class="modal">
    <div class="modal-content">
      <span class="close" data-modal="cartModal">&times;</span>
      <h3>Giỏ Hàng Của Bạn</h3>
      <div id="cart-items"></div>
      <div class="modal-footer">
        Tổng cộng: <span id="cart-total-price">0₫</span>
      </div>
      <div>
        <label for="phone-number">5 số cuối SĐT của bạn:</label>
        <input type="text" id="phone-number" placeholder="Ví dụ: 12345" required pattern="\d{5}" maxlength="5" title="Vui lòng nhập 5 chữ số cuối.">
        <label for="notes">Ghi chú:</label>
        <textarea id="notes" placeholder="Ví dụ: Ít đường, thêm đá..."></textarea>
      </div>
      <button id="submit-order-cart">Xác nhận Đặt Hàng</button>
    </div>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/8.6.8/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.6.8/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.6.8/firebase-firestore.js"></script>

  <script>
    const MENU = [
      // món 1
      {
        img: "Trà sữa 1.png",
        name: "Trà Sữa Dâu",
        group: "Trà Sữa",
        options: [
          { size: "M", price: 10000 },
          { size: "L", price: 12000 },
          { size: "XL", price: 15000 },
        ],
        desc: "Trà sữa truyền thống kèm trân châu đen.\nNgon ngọt, dễ uống, phù hợp mọi lứa tuổi."
      },
      // món 2
      {
        img: "Trà sữa 2.png",
        name: "Matcha latte",
        group: "Trà Sữa",
        options: [
          { size: "M", price: 29000 },
          { size: "L", price: 30000 },
          { size: "XL", price: 32000 },
        ],
        desc: "Matcha Nhật Bản thanh mát.Kết hợp sữa tươi béo nhẹ, thơm dịu."
      },
      // món 3
      {
        img: "Topping 1.png",
        name: "Topping Dừa",
        group: "Topping",
        options: [ { size: "", price: 7000 } ],
        desc: "Ngon giòn béo nhẹ."
      },
      // món 4
      {
        img: "Topping 2.png",
        name: "Topping Nha Đam",
        group: "Topping",
        options: [ { size: "", price: 5000 } ],
        desc: "Mát lạnh, giòn sần sật."
      },
      // món 5
      {
        img: "Trà sữa 3.png",
        name: "Sô-cô-la sữa",
        group: "Trà Sữa",
        options: [
          { size: "M", price: 25000 },
          { size: "L", price: 27000 },
          { size: "XL", price: 30000 },
        ],
        desc: "Sô-cô-la ngọt ngào, hòa quyện cùng sữa tươi."
      },
      // món 6
      {
        img: "Topping 3.png",
        name: "Topping A",
        group: "Topping",
        options: [ { size: "", price: 7000 } ],
        desc: "Mô tả cái gì đó ...về topping A.."
      }
    ];

    const IMAGE_BASE = "./";
    let cart = [];

    function getRandomPastelColor() {
      const hue = Math.floor(Math.random() * 360);
      const saturation = 70 + Math.random() * 20;
      const lightness = 85 + Math.random() * 10;
      return `hsl(${hue}, ${saturation}%, ${lightness}%)`;
    }

    const grid = document.getElementById("menu");
    const groupList = document.getElementById("group-list");
    const cartButton = document.getElementById("cart-button");
    const cartCount = document.getElementById("cart-count");
    const orderListContainer = document.getElementById("order-list-container");
    const orderList = document.getElementById("order-list");

    const groups = [...new Set(MENU.map(item => item.group))];
    groups.forEach(group => {
      const btn = document.createElement("button");
      btn.textContent = group;
      btn.onclick = () => renderMenu(group);
      groupList.appendChild(btn);
    });

    function renderMenu(group) {
      grid.innerHTML = "";
      MENU.filter(item => item.group === group).forEach(item => {
        const card = document.createElement("div");
        card.className = "card";
        card.style.backgroundColor = getRandomPastelColor();

        let optionsHTML = "";
        item.options.forEach(opt => {
          optionsHTML += `<div class="meta">${opt.size ? `Size ${opt.size}` : ""} - <span class="price">${opt.price.toLocaleString('vi-VN')}₫</span></div>`;
        });

        card.innerHTML = `
          <img src="${IMAGE_BASE + item.img}" alt="${item.name}">
          <div class="info">
            <div class="name">${item.name}</div>
            ${optionsHTML}
            <div class="desc">${item.desc || ""}</div>
          </div>
          <button class="add-to-cart-button" data-name="${item.name}">Thêm vào giỏ</button>
        `;
        grid.appendChild(card);
      });
      // Gán sự kiện cho các nút "Thêm vào giỏ"
      document.querySelectorAll('.add-to-cart-button').forEach(button => {
        button.addEventListener('click', handleAddToCart);
      });
    }

    // render nhóm đầu tiên mặc định
    renderMenu(groups[0]);

    // hiệu ứng hoa rơi
    const fallingContainer = document.getElementById("falling-container");
    const symbols = ['🌸','🌼','🌺','✨','🌷','🌻','🍀','🌹','🍂','🍃','❄️','💮'];

    function createFallingElement() {
      const element = document.createElement('div');
      element.className = 'falling-element';
      element.textContent = symbols[Math.floor(Math.random() * symbols.length)];
      element.style.left = `${Math.random() * 100}vw`;
      element.style.animationDuration = `${Math.random() * 5 + 5}s`;
      element.style.animationDelay = `-${Math.random() * 5}s`;
      fallingContainer.appendChild(element);
      setTimeout(() => element.remove(), 10000);
    }

    for (let i = 0; i < 30; i++) createFallingElement();
    setInterval(createFallingElement, 1000);

    // Bắt đầu phần code Firebase
    const firebaseConfig = {
      apiKey: "AIzaSyARctBmqbmoL9KPT2snk7aKebxJ-SKoMbQ",
      authDomain: "trasua-4a1d9.firebaseapp.com",
      projectId: "trasua-4a1d9",
      storageBucket: "trasua-4a1d9.firebasestorage.app",
      messagingSenderId: "210496424940",
      appId: "1:210496424940:web:b84d326448cc7fcb790ec9",
      measurementId: "G-9R75DB010Y"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    const ordersCollection = db.collection('orders');

    const loginForm = document.getElementById('login-form');
    const authStatus = document.getElementById('auth-status');
    const logoutBtn = document.getElementById('logout-btn');
    const changePasswordBtn = document.getElementById('change-password-btn');
    const createUserBtn = document.getElementById('create-user-btn');

    // Các biến cho modal đổi mật khẩu
    const changePasswordModal = document.getElementById('changePasswordModal');
    const oldPasswordInput = document.getElementById('old-password');
    const newPasswordInput = document.getElementById('new-password');
    const confirmNewPasswordInput = document.getElementById('confirm-new-password');
    const submitChangePasswordBtn = document.getElementById('submit-change-password');
    
    // Các biến cho modal tạo tài khoản
    const createUserModal = document.getElementById('createUserModal');
    const newUserEmailInput = document.getElementById('new-user-email');
    const newUserPasswordInput = document.getElementById('new-user-password');
    const submitCreateUserBtn = document.getElementById('submit-create-user');

    // Các biến cho modal giỏ hàng
    const cartModal = document.getElementById('cartModal');
    const cartItemsDiv = document.getElementById('cart-items');
    const cartTotalPrice = document.getElementById('cart-total-price');
    const phoneNumberInput = document.getElementById('phone-number');
    const notesInput = document.getElementById('notes');
    const submitOrderCartBtn = document.getElementById('submit-order-cart');

    const closeButtons = document.querySelectorAll('.modal .close');

    // Mở modal khi click nút "Đổi mật khẩu"
    changePasswordBtn.addEventListener('click', () => {
      changePasswordModal.style.display = 'block';
    });

    // Mở modal khi click nút "Tạo tài khoản mới"
    createUserBtn.addEventListener('click', () => {
      createUserModal.style.display = 'block';
    });
    
    // Mở modal giỏ hàng
    cartButton.addEventListener('click', () => {
      renderCart();
      cartModal.style.display = 'block';
    });
    
    // Xử lý thêm món vào giỏ hàng
    function handleAddToCart(e) {
      const itemName = e.target.getAttribute('data-name');
      const item = MENU.find(m => m.name === itemName);

      if (item) {
        // Nếu món đã có trong giỏ, tăng số lượng lên 1 và reset size về mặc định
        const existingItem = cart.find(c => c.name === itemName);
        if (existingItem) {
          existingItem.quantity++;
          existingItem.size = item.options[0].size; // Reset size về mặc định
          existingItem.price = item.options[0].price;
        } else {
          // Thêm món mới vào giỏ hàng với số lượng mặc định 1 và size đầu tiên
          const defaultOption = item.options[0];
          cart.push({
            name: item.name,
            size: defaultOption.size,
            price: defaultOption.price,
            quantity: 1,
            options: item.options
          });
        }
        updateCartCount();
        alert(`Đã thêm "${item.name}" vào giỏ hàng!`);
      }
    }

    // Cập nhật số lượng món trong giỏ hàng
    function updateCartCount() {
      cartCount.textContent = cart.length;
    }
    
    // Render lại giỏ hàng trong modal
    function renderCart() {
      cartItemsDiv.innerHTML = '';
      let total = 0;

      if (cart.length === 0) {
        cartItemsDiv.innerHTML = '<p>Giỏ hàng trống.</p>';
      } else {
        cart.forEach((item, index) => {
          const itemDiv = document.createElement('div');
          itemDiv.className = 'modal-item';
          
          let optionsHTML = '';
          if (item.options) {
            optionsHTML = `<select class="item-size" data-index="${index}">`;
            item.options.forEach(opt => {
              optionsHTML += `<option value="${opt.size}" ${item.size === opt.size ? 'selected' : ''}>${opt.size || 'N/A'}</option>`;
            });
            optionsHTML += '</select>';
          }

          itemDiv.innerHTML = `
            <div class="item-info">
              <h4>${item.name}</h4>
              <div style="font-size: 0.9em; color: #555;">${(item.price * item.quantity).toLocaleString('vi-VN')}₫</div>
            </div>
            <div class="item-controls">
              ${optionsHTML}
              <input type="number" class="item-quantity" data-index="${index}" value="${item.quantity}" min="1" style="width: 50px;">
              <button class="remove-btn" data-index="${index}">&times;</button>
            </div>
          `;
          cartItemsDiv.appendChild(itemDiv);
          
          // Tính tổng giá
          total += item.price * item.quantity;
        });
      }

      cartTotalPrice.textContent = total.toLocaleString('vi-VN') + '₫';
      
      // Gán lại sự kiện sau khi render
      document.querySelectorAll('.item-size').forEach(select => {
        select.addEventListener('change', updateCartItem);
      });
      document.querySelectorAll('.item-quantity').forEach(input => {
        input.addEventListener('change', updateCartItem);
      });
      document.querySelectorAll('.remove-btn').forEach(button => {
        button.addEventListener('click', removeCartItem);
      });
    }

    // Cập nhật món trong giỏ hàng khi thay đổi size hoặc số lượng
    function updateCartItem(e) {
      const index = e.target.getAttribute('data-index');
      const item = cart[index];
      
      if (e.target.classList.contains('item-size')) {
        const selectedSize = e.target.value;
        const option = item.options.find(opt => opt.size === selectedSize);
        if (option) {
          item.size = option.size;
          item.price = option.price;
        }
      } else if (e.target.classList.contains('item-quantity')) {
        item.quantity = parseInt(e.target.value, 10);
        if (item.quantity < 1) item.quantity = 1;
      }
      renderCart();
    }
    
    // Xóa món khỏi giỏ hàng
    function removeCartItem(e) {
      const index = e.target.getAttribute('data-index');
      cart.splice(index, 1);
      updateCartCount();
      renderCart();
    }
    
    // Xử lý submit đơn hàng từ giỏ
    submitOrderCartBtn.addEventListener('click', async () => {
        const phoneNumber = phoneNumberInput.value.trim();
        const notes = notesInput.value.trim();
        
        if (cart.length === 0) {
            alert('Giỏ hàng trống, vui lòng chọn món trước khi đặt.');
            return;
        }

        if (!/^\d{5}$/.test(phoneNumber)) {
            alert('Vui lòng nhập 5 chữ số cuối của số điện thoại.');
            return;
        }

        const newOrder = {
            phoneNumber: phoneNumber,
            items: cart,
            notes: notes,
            completed: false,
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        };

        try {
            await ordersCollection.add(newOrder);
            alert('Đơn hàng của bạn đã được gửi thành công!');
            cart = []; // Xóa giỏ hàng sau khi đặt thành công
            updateCartCount();
            cartModal.style.display = 'none';
        } catch (error) {
            console.error("Lỗi khi thêm đơn hàng: ", error);
            alert('Gửi đơn hàng thất bại. Vui lòng thử lại.');
        }
    });

    // Đóng các modal khi click nút 'x' hoặc click ra ngoài
    closeButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        const modalId = btn.getAttribute('data-modal');
        document.getElementById(modalId).style.display = 'none';
        // Xóa rỗng các trường input
        if (modalId === 'changePasswordModal') {
          oldPasswordInput.value = '';
          newPasswordInput.value = '';
          confirmNewPasswordInput.value = '';
        } else if (modalId === 'createUserModal') {
          newUserEmailInput.value = '';
          newUserPasswordInput.value = '';
        } else if (modalId === 'cartModal') {
          phoneNumberInput.value = '';
          notesInput.value = '';
        }
      });
    });

    window.addEventListener('click', (e) => {
      if (e.target.classList.contains('modal')) {
        e.target.style.display = 'none';
        if (e.target.id === 'changePasswordModal') {
          oldPasswordInput.value = '';
          newPasswordInput.value = '';
          confirmNewPasswordInput.value = '';
        } else if (e.target.id === 'createUserModal') {
          newUserEmailInput.value = '';
          newUserPasswordInput.value = '';
        } else if (e.target.id === 'cartModal') {
          phoneNumberInput.value = '';
          notesInput.value = '';
        }
      }
    });

    // Xử lý đổi mật khẩu
    submitChangePasswordBtn.addEventListener('click', () => {
      const oldPassword = oldPasswordInput.value;
      const newPassword = newPasswordInput.value;
      const confirmNewPassword = confirmNewPasswordInput.value;

      if (newPassword.length < 6) {
        alert('Mật khẩu mới phải có ít nhất 6 ký tự.');
        return;
      }
      
      if (newPassword !== confirmNewPassword) {
        alert('Mật khẩu mới không khớp. Vui lòng thử lại.');
        return;
      }
      
      const user = auth.currentUser;
      if (user) {
        const credential = firebase.auth.EmailAuthProvider.credential(user.email, oldPassword);
        
        user.reauthenticateWithCredential(credential)
          .then(() => {
            user.updatePassword(newPassword)
              .then(() => {
                alert('Đổi mật khẩu thành công!');
                changePasswordModal.style.display = 'none';
                oldPasswordInput.value = '';
                newPasswordInput.value = '';
                confirmNewPasswordInput.value = '';
              })
              .catch(error => {
                console.error(error);
                alert('Đổi mật khẩu thất bại: ' + error.message);
              });
          })
          .catch(error => {
            console.error(error);
            alert('Mật khẩu cũ không đúng. Vui lòng thử lại.');
          });
      } else {
        alert('Bạn chưa đăng nhập. Vui lòng đăng nhập để thực hiện chức năng này.');
      }
    });

    // Xử lý tạo tài khoản mới
    submitCreateUserBtn.addEventListener('click', () => {
      const newUserEmail = newUserEmailInput.value;
      const newUserPassword = newUserPasswordInput.value;

      if (newUserEmail && newUserPassword.length >= 6) {
        auth.createUserWithEmailAndPassword(newUserEmail, newUserPassword)
          .then((cred) => {
            console.log('Tài khoản mới đã được tạo:', cred.user);
            alert('Tài khoản mới đã được tạo thành công!');
            createUserModal.style.display = 'none';
            newUserEmailInput.value = '';
            newUserPasswordInput.value = '';
          })
          .catch(err => {
            alert('Tạo tài khoản thất bại: ' + err.message);
          });
      } else {
        alert('Vui lòng nhập email và mật khẩu hợp lệ (ít nhất 6 ký tự).');
      }
    });

    // Xử lý đăng nhập
    loginForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const email = loginForm['login-email'].value;
      const password = loginForm['login-password'].value;

      auth.signInWithEmailAndPassword(email, password)
        .then((cred) => {
          console.log('Người dùng đã đăng nhập:', cred.user);
          alert('Đăng nhập thành công!');
        })
        .catch(err => {
          console.error(err.message);
          alert('Đăng nhập thất bại: ' + err.message);
        });
    });

    // Xử lý đăng xuất
    logoutBtn.addEventListener('click', () => {
      auth.signOut().then(() => {
        console.log('Người dùng đã đăng xuất.');
        alert('Đã đăng xuất.');
        document.getElementById('login-email').value = '';
        document.getElementById('login-password').value = '';
      });
    });

    // Lắng nghe trạng thái đăng nhập
    auth.onAuthStateChanged(user => {
      if (user) {
        // Đã đăng nhập
        authStatus.textContent = `Chào mừng, ${user.email}!`;
        loginForm.style.display = 'none';
        logoutBtn.style.display = 'block';
        changePasswordBtn.style.display = 'block';
        orderListContainer.style.display = 'block';
        
        // Kiểm tra quyền Admin
        if (user.email === 'admin@myapp.com') {
          createUserBtn.style.display = 'block';
          listenForOrders(ordersCollection);
        } else {
          createUserBtn.style.display = 'none';
          orderList.innerHTML = 'Bạn không có quyền xem danh sách đơn hàng.';
        }
      } else {
        // Chưa đăng nhập
        authStatus.textContent = 'Bạn chưa đăng nhập.';
        loginForm.style.display = 'flex';
        logoutBtn.style.display = 'none';
        changePasswordBtn.style.display = 'none';
        createUserBtn.style.display = 'none';
        orderListContainer.style.display = 'none';
        
        if (typeof unsubscribe !== 'undefined') {
          unsubscribe();
        }
      }
    });

    let unsubscribe;
    function listenForOrders(collection) {
        if (typeof unsubscribe !== 'undefined') {
            unsubscribe();
        }

        // Lắng nghe đơn hàng, sắp xếp theo thời gian mới nhất
        unsubscribe = collection.orderBy("timestamp", "desc").onSnapshot(snapshot => {
            if (snapshot.empty) {
                orderList.innerHTML = 'Không có đơn hàng nào.';
                return;
            }
            orderList.innerHTML = '';
            snapshot.forEach(doc => {
                const orderData = doc.data();
                const orderCard = document.createElement('div');
                orderCard.className = `order-card ${orderData.completed ? 'completed' : ''}`;
                orderCard.dataset.id = doc.id; // Lưu ID của document
                
                let itemsHTML = '';
                let totalPrice = 0;
                orderData.items.forEach(item => {
                    const itemTotal = item.price * item.quantity;
                    totalPrice += itemTotal;
                    itemsHTML += `
                        <div class="order-item-detail">
                            ${item.quantity} x ${item.name} (${item.size ? `Size: ${item.size}` : 'Không size'})
                            <span style="font-weight: bold; color: #e63946;">
                                ${itemTotal.toLocaleString('vi-VN')}₫
                            </span>
                        </div>
                    `;
                });
                
                const timestamp = orderData.timestamp ? orderData.timestamp.toDate().toLocaleString('vi-VN') : 'Đang cập nhật...';

                orderCard.innerHTML = `
                    <h4>Đơn hàng của khách ${orderData.phoneNumber}</h4>
                    <div>${itemsHTML}</div>
                    <div style="font-weight: bold; margin-top: 10px;">Tổng cộng: ${totalPrice.toLocaleString('vi-VN')}₫</div>
                    ${orderData.notes ? `<div>Ghi chú: ${orderData.notes}</div>` : ''}
                    <div class="order-meta">Thời gian: ${timestamp}</div>
                    <button class="complete-btn">${orderData.completed ? 'Đã hoàn thành' : 'Đánh dấu đã xong'}</button>
                `;
                orderList.appendChild(orderCard);
            });
            
            // Gán sự kiện cho các nút hoàn thành
            document.querySelectorAll('.complete-btn').forEach(btn => {
                btn.addEventListener('click', toggleOrderCompleted);
            });
            
        }, err => {
            console.error('Lỗi khi lấy đơn hàng:', err);
            orderList.innerHTML = 'Lỗi khi tải đơn hàng. Vui lòng kiểm tra console.';
        });
    }

    // Hàm gạch chân đơn hàng đã xong
    async function toggleOrderCompleted(e) {
      const orderCard = e.target.closest('.order-card');
      const orderId = orderCard.dataset.id;
      const docRef = ordersCollection.doc(orderId);

      try {
        const doc = await docRef.get();
        if (doc.exists) {
          const currentStatus = doc.data().completed;
          await docRef.update({ completed: !currentStatus });
          console.log(`Đã cập nhật trạng thái đơn hàng ${orderId}`);
        }
      } catch (error) {
        console.error("Lỗi khi cập nhật trạng thái đơn hàng: ", error);
        alert("Có lỗi xảy ra khi cập nhật trạng thái.");
      }
    }
  </script>
</body>
</html>
