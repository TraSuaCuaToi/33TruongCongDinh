<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <title>Menu Trà Sữa</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: white;
      padding:20px;
      position: relative;
      min-height: 100vh;
    }
    .grid {
      display:grid;
      grid-template-columns:repeat(auto-fill, minmax(220px,1fr));
      gap:18px;
      background-color: #ffe4e9; /* Nền màu hồng nhạt */
      padding: 20px;
      border-radius: 12px;
    }
    .card {
      background:#fff;
      border:1px solid #ddd;
      border-radius:8px;
      overflow:hidden;
      box-shadow:0 2px 6px rgba(0,0,0,.1);
      display:flex;
      flex-direction:column;
    }
    .card img {
      width:100%;
      height:160px;
      object-fit:cover;
      display:block;
    }
    .info {
      padding:12px;
      display:flex;
      flex-direction:column;
      gap:6px;
    }
    .name {
      font-weight:bold;
      font-size:16px;
    }
    .meta {
      font-size:14px;
      color:#555;
    }
    .price {
      font-weight:bold;
      color:#e63946;
    }
    .desc {
      font-size:14px;
      color:#444;
      line-height:1.4;
      white-space:pre-line;
      margin-top:6px;
    }

    /* Keyframes cho hiệu ứng hoa rơi */
    @keyframes fall {
      0% { transform: translateY(-10vh) rotate(0deg); opacity: 0; }
      10% { opacity: 1; }
      100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
    }

    .falling-element {
      position: fixed;
      top: 0;
      left: 0;
      font-size: 2rem;
      pointer-events: none;
      z-index: 100;
      animation: fall linear infinite;
    }

    /* CSS cho tên và địa chỉ quán */
    .store-info {
      text-align: center;
      margin-bottom: 30px;
      color: #e63949;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
    }

.store-name {
  font-family: 'Dancing Script', cursive;
  font-size: 5rem;
  color: #8e44ad; /* đổi màu */
  margin: 0;
  line-height: 1.2;
}


    .store-address {
      font-size: 1.2rem;
      margin-top: 5px;
      color: #555;
    }

    /* Tiêu đề menu */
    h2 {
      text-align: center;
      color: #e63946;
      margin: 20px 0;
      font-size: 2.5rem;
      font-family: 'Dancing Script', cursive;
      text-transform: uppercase;
      letter-spacing: 2px;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
    }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
</head>
<body>
  <div id="falling-container"></div>

  <div class="store-info">
    <h1 class="store-name">Trà Sữa Của Tôi</h1>     <!-- Đây là tên quán của bạn,có thể đổi tại đây. chỉ đổi chữ Trà Sữa Mơ Màng thanh tên quán bạn  -->
    <p class="store-address">33 Tôn Đức Thắng, Đà Nẵng</p> <!-- Đây là địa chỉ quán của bạn,  -->
  </div>

  <h2>Menu Trà Sữa</h2>	
  <div id="menu" class="grid"></div>

  <script>
    // 🔹 Khai báo menu với nhiều size và giá
    const MENU = [
      {
        img: "Trà sữa 1.png",
        name: "Trà Sữa Dâu",
        options: [
          { size: "M", price: 10000 },
          { size: "L", price: 12000 },
          { size: "XL", price: 15000 },
        ],
        desc: "Trà sữa truyền thống kèm trân châu đen.\nNgon ngọt, dễ uống, phù hợp mọi lứa tuổi."
      },


      {
        img: "Trà sữa 2.png",
        name: "Matcha latte",
        options: [
          { size: "M", price: 29000 },
          { size: "L", price: 30000 },
          { size: "XL", price: 32000 },
        ],
        desc: "Matcha Nhật Bản thanh mát.Kết hợp sữa tươi béo nhẹ, thơm dịu."
      },





    {
        img: "Topping 1.png",
        name: "Topping Dừa",
        options: [
            { size: "", price: 7000 },
          //{ size: "L", price: 32000 },
          //{ size: "XL", price: 35000 },
        ],
        desc: "Trà Ô Long đậm vị, hậu ngọt thanh.Phù hợp cho người thích vị trà rõ rệt."
      },
////////////////////////////////////////////////////////////////////////////////////

    {
        img: "Topping 2.png",
        name: "Topping Nha Đam",
        options: [
          { size: "", price: 5000 }, // topping không có size thì bỏ size bằng 2 dấu //
          //{ size: "L", price: 32000 },
          //{ size: "XL", price: 35000 }
        ],
        desc: "Mô tả cái gi đó ......"
      },
//////////////////////////////////////////////////////////////////////////////////////////////////////
      {
        img: "Trà sữa 3.png",
        name: "Sô-cô-la sữa",
        options: [
          { size: "M", price: 25000 },
          { size: "L", price: 27000 },
          { size: "XL", price: 30000 },
        ],
        desc: "Sô-cô-la ngọt ngào, hòa quyện cùng sữa tươi.Thức uống dành cho tín đồ hảo ngọt."
      },
////////////////////////////////////////////////////////////////////////////////////////////////
/////////////////////////bắt đâu thêm món mới ở đây///////////////////////////////////////////
// copy cả cụm trên  đoạn giữa các dấu //////////// 
// img: "Topping 2.png",         đây là tên ảnh, ghi tên đúng 100% với ảnh lưu trên máy
// name: "Topping Nha Đam",      tên sẽ hiển thi lên web   nhớ ghi giũa dấu " "
//        options: [  .....],  trong này là khai size. nếu không có size thi không cần khai.không khai báo nhưng không xóa options: [  .....],  /bên trong để trống
// desc: "Mô tả cái gi đó ......"  mô tả thêm về món
// Lưu ý copy nguyên rồi sủa theo đúng cấu trúc. nhớ kĩ không xóa các dấu , "" [ ]  vân vân.  chi thay đổi đúng cái bạn cần.


      {
        img: "Trà sữa 4.png",
        name: "Sô-cô-la dâu",
        options: [
          { size: "M", price: 25000 },
          { size: "L", price: 27000 },
         // { size: "XL", price: 30000 },  // khong co size thi bỏ ra 
	//{ size: "XXL", price: 50000 },
        ],
        desc: "Sô-cô-la ngọt ngào,mô tả cai gi đó ."
      },

// thêm topping

    {
        img: "Topping 3.png",
        name: "Topping A",
        options: [
          { size: "", price: 7000 }, // topping không có size thì bỏ size bằng 2 dấu //
          //{ size: "L", price: 32000 },
          //{ size: "XL", price: 35000 }
        ],
        desc: "Mô tả cái gi đó ...vê topping A.."
      },









    ];
    const IMAGE_BASE = "./"; // ảnh để chung folder với index.html

    /**
     * Tạo màu pastel ngẫu nhiên
     */
    function getRandomPastelColor() {
      const hue = Math.floor(Math.random() * 360);
      const saturation = 70 + Math.random() * 20;
      const lightness = 85 + Math.random() * 10;
      return `hsl(${hue}, ${saturation}%, ${lightness}%)`;
    }

    const grid = document.getElementById("menu");
    MENU.forEach(item => {
      const card = document.createElement("div");
      card.className = "card";
      card.style.backgroundColor = getRandomPastelColor();

      // Tạo danh sách size + giá
      let optionsHTML = "";
      item.options.forEach(opt => {
        optionsHTML += `<div class="meta">Size ${opt.size} - <span class="price">${opt.price.toLocaleString('vi-VN')}₫</span></div>`;
      });

      card.innerHTML = `
        <img src="${IMAGE_BASE + item.img}" alt="${item.name}">
        <div class="info">
          <div class="name">${item.name}</div>
          ${optionsHTML}
          <div class="desc">${item.desc || ""}</div>
        </div>
      `;
      grid.appendChild(card);
    });

    // === Hiệu ứng hoa rơi ===
    const fallingContainer = document.getElementById("falling-container");
    const symbols = ['🌸', '🌼', '🌺', '✨'];

    function createFallingElement() {
      const element = document.createElement('div');
      element.className = 'falling-element';
      element.textContent = symbols[Math.floor(Math.random() * symbols.length)];
      element.style.left = `${Math.random() * 100}vw`;
      element.style.animationDuration = `${Math.random() * 5 + 5}s`;
      element.style.animationDelay = `-${Math.random() * 5}s`;
      fallingContainer.appendChild(element);

      setTimeout(() => {
        element.remove();
      }, 10000);
    }

    for (let i = 0; i < 30; i++) {
        createFallingElement();
    }
    setInterval(createFallingElement, 1000); // tạo chậm hơn để nhẹ trang
  </script>
</body>
</html>
