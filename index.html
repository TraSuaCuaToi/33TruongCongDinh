<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <title>Menu Trà Sữa</title>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js"></script>
  <style>
    body { font-family: Arial, sans-serif; margin:0; padding:0; display:flex; min-height:100vh; }
    .sidebar { width:200px; background:#f8f8f8; padding:20px; box-shadow:2px 0 6px rgba(0,0,0,0.1); }
    .main { margin-left:220px; padding:20px; flex:1; }
    .login-box { text-align:center; margin-bottom:20px; }
    .login-box input { padding:8px; margin:4px; width:200px; }
    .login-box button { padding:8px 16px; margin:4px; background:#e63946; color:#fff; border:none; border-radius:4px; cursor:pointer; }
    .login-box button:hover { background:#c62828; }
  </style>
</head>
<body>
  <div class="sidebar">
    <h3>Nhóm món</h3>
    <div id="group-list"></div>
  </div>

  <div class="main">
    <div class="login-box">
      <h2>Đăng nhập</h2>
      <input type="text" id="email" placeholder="Email hoặc Admin"><br>
      <input type="password" id="password" placeholder="Mật khẩu"><br>
      <button onclick="signUp()">Tạo tài khoản</button>
      <button onclick="signIn()">Đăng nhập</button>
      <button onclick="signOutUser()">Đăng xuất</button>
      <button onclick="resetPassword()">Đổi mật khẩu</button>
      <p id="user-info"></p>
    </div>

    <div id="falling-container"></div>
    <div class="store-info">
      <h1 class="store-name">Trà Sữa Của Tôi</h1>
      <p class="store-address">33 Tôn Đức Thắng, Đà Nẵng</p>
    </div>

    <h2>Menu Trà Sữa</h2>
    <div id="menu" class="grid"></div>
  </div>

  <script>
    // Firebase Config
    const firebaseConfig = {
      apiKey: "AIzaSyARctBmqbmoL9KPT2snk7aKebxJ-SKoMbQ",
      authDomain: "trasua-4a1d9.firebaseapp.com",
      projectId: "trasua-4a1d9",
      storageBucket: "trasua-4a1d9.firebasestorage.app",
      messagingSenderId: "210496424940",
      appId: "1:210496424940:web:b84d326448cc7fcb790ec9",
      measurementId: "G-9R75DB010Y"
    };
    const app = firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    // Hàm chuẩn hoá email: thêm @myapp.com nếu thiếu
    function formatEmail(input){
      if(!input.includes("@")){
        return input+"@myapp.com";
      }
      return input;
    }

    function signUp(){
      let email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      email = formatEmail(email);
      // Chỉ admin mới được tạo tài khoản mới
      if(auth.currentUser && auth.currentUser.email === "admin@myapp.com"){
        auth.createUserWithEmailAndPassword(email,password)
          .then(userCredential=>{
            document.getElementById("user-info").innerText="Tạo tài khoản thành công: "+userCredential.user.email;
          })
          .catch(error=>{ document.getElementById("user-info").innerText=error.message; });
      } else {
        document.getElementById("user-info").innerText="Chỉ admin mới có quyền tạo tài khoản mới.";
      }
    }

    function signIn(){
      let email=document.getElementById("email").value.trim();
      const password=document.getElementById("password").value;
      email = formatEmail(email);
      auth.signInWithEmailAndPassword(email,password)
        .then(userCredential=>{
          document.getElementById("user-info").innerText="Đăng nhập thành công: "+userCredential.user.email;
        })
        .catch(error=>{ document.getElementById("user-info").innerText=error.message; });
    }

    function signOutUser(){
      auth.signOut().then(()=>{ document.getElementById("user-info").innerText="Đã đăng xuất."; });
    }

    function resetPassword(){
      let email=document.getElementById("email").value.trim();
      email = formatEmail(email);
      auth.sendPasswordResetEmail(email)
        .then(()=>{ document.getElementById("user-info").innerText="Email đặt lại mật khẩu đã gửi đến: "+email; })
        .catch(error=>{ document.getElementById("user-info").innerText=error.message; });
    }

    auth.onAuthStateChanged(user=>{
      if(user){
        document.getElementById("user-info").innerText="Đang đăng nhập: "+user.email;
      } else {
        document.getElementById("user-info").innerText="Chưa đăng nhập.";
      }
    });

    // ====== Phần code menu giữ nguyên từ file gốc ======
    const MENU = [
      { img: "Trà sữa 1.png", name: "Trà Sữa Dâu", group: "Trà Sữa", options:[{size:"M",price:10000},{size:"L",price:12000},{size:"XL",price:15000}], desc:"Trà sữa truyền thống kèm trân châu đen." },
      { img: "Trà sữa 2.png", name: "Matcha latte", group: "Trà Sữa", options:[{size:"M",price:29000},{size:"L",price:30000},{size:"XL",price:32000}], desc:"Matcha Nhật Bản thanh mát." },
      { img: "Topping 1.png", name: "Topping Dừa", group: "Topping", options:[{size:"",price:7000}], desc:"Ngon giòn béo nhẹ." },
      { img: "Topping 2.png", name: "Topping Nha Đam", group: "Topping", options:[{size:"",price:5000}], desc:"Mát lạnh, giòn sần sật." },
      { img: "Trà sữa 3.png", name: "Sô-cô-la sữa", group: "Trà Sữa", options:[{size:"M",price:25000},{size:"L",price:27000},{size:"XL",price:30000}], desc:"Sô-cô-la ngọt ngào." },
      { img: "Topping 3.png", name: "Topping A", group: "Topping", options:[{size:"",price:7000}], desc:"Mô tả topping A" }
    ];

    const IMAGE_BASE = "./";
    const grid = document.getElementById("menu");
    const groupList = document.getElementById("group-list");

    const groups = [...new Set(MENU.map(item => item.group))];
    groups.forEach(group => {
      const btn = document.createElement("button");
      btn.textContent = group;
      btn.onclick = () => renderMenu(group);
      groupList.appendChild(btn);
    });

    function renderMenu(group) {
      grid.innerHTML = "";
      MENU.filter(item => item.group === group).forEach(item => {
        const card = document.createElement("div");
        card.className = "card";
        card.style.backgroundColor = "#fff8f8";

        let optionsHTML = "";
        item.options.forEach(opt => {
          optionsHTML += `<div class="meta">${opt.size ? `Size ${opt.size}` : ""} - <span class="price">${opt.price.toLocaleString('vi-VN')}₫</span></div>`;
        });

        card.innerHTML = `
          <img src="${IMAGE_BASE + item.img}" alt="${item.name}">
          <div class="info">
            <div class="name">${item.name}</div>
            ${optionsHTML}
            <div class="desc">${item.desc || ""}</div>
          </div>
        `;
        grid.appendChild(card);
      });
    }
    renderMenu(groups[0]);
  </script>
</body>
</html>
